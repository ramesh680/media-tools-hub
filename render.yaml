# Render Blueprint - deploys two free web services from this one repo:
#   1) media-tools-hub        -> the landing page + Excel Validator + YouTube Release Verifier
#   2) upcoming-release-movies -> the standalone upcoming-movies app (port 8765 locally)
#
# How to use: push this repo to GitHub, then in Render choose
# "New +" -> "Blueprint" and point it at the repo. Render reads this file.
#
# Free instances sleep after ~15 min idle and cold-start on the next request.
services:
  - type: web
    name: media-tools-hub
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      # IMDB_ENABLED stays false on the free tier: the official IMDb datasets
      # (title.basics + name.basics from datasets.imdbws.com) and the SQLite index
      # built from them are multi-GB and need a paid plan + persistent disk. With it
      # off, the IMDb-enriched cards fall back to the TMDB API and Wikidata so the
      # lightweight tools keep working.
      #
      # To switch to dataset-backed IMDb codes (titles -> title.basics, talent ->
      # name.basics) set IMDB_ENABLED to "true", move this service to a paid plan
      # (>= standard, 2 GB RAM), and add a persistent disk, e.g.:
      #     plan: standard
      #     disk:
      #       name: imdb-index
      #       mountPath: /var/imdb
      #       sizeGB: 10
      # then add an IMDB_CACHE_DIR env var set to /var/imdb so the index survives
      # restarts instead of re-downloading on every boot.
      - key: IMDB_ENABLED
        value: "false"
      # Secrets - set the values in the Render dashboard (sync:false = not stored in repo).
      - key: YOUTUBE_API_KEY
        sync: false
      - key: TMDB_API_KEY
        value: "6891671a0d1a2f06ddae357589aa30f6"
      - key: TMDB_READ_ACCESS_TOKEN
        value: "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI2ODkxNjcxYTBkMWEyZjA2ZGRhZTM1NzU4OWFhMzBmNiIsIm5iZiI6MTc1ODE3ODQzNi42MjcsInN1YiI6IjY4Y2JhYzg0MzMyNzUwYThlMGJkMGI0OSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.oTjMD3pEu4vOE-A6sX0XZgqRS8M7i7Gs3_i62p5NHqQ"
      # After the movies service is live, paste its full https URL here so the
      # hub shows a link card for it (e.g. https://upcoming-release-movies.onrender.com).
      - key: UPCOMING_MOVIES_URL
        sync: false

  - type: web
    name: upcoming-release-movies
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: python upcoming_movies/upcoming_release_movies_app.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /
